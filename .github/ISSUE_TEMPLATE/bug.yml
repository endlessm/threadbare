name: Bug
description: An unexpected problem or behavior
type: Bug
body:
  - type: markdown
    attributes:
      value: >
        Thanks for taking the time to file an issue! **Please provide as much
        detail as you can** so we can properly confirm, triage, and fix your bug.

  - type: input
    id: version
    attributes:
      label: Threadbare version
      placeholder: e.g. v0.1.11
      description: >
        This is shown on the title screen. If you're not sure, leave it blank.
    validations:
      required: false

  - type: input
    id: scene
    attributes:
      label: Affected scene
      placeholder: e.g. Fray's End, quests/lore_quests/quest_002/3_void_grappling/void_grappling_round_2.tscn
      description: >
        Give an example of a scene in the game where you see this problem. If
        you're not sure, describe the scene visually, or leave this blank.

        If you report a problem from within the game, this will have been filled
        automatically with the current scene. You can change this if you are
        reporting a problem you saw in a different scene.
    validations:
      required: false

  - type: textarea
    id: about
    attributes:
      label: Description
      description: >
        Describe the bug you're seeing. Provide detail such as **where in the
        game** you experienced it and **what you were doing** in the game when
        it happened. If you can make it happen reliably, **share the steps to
        reproduce it**. If possible, please attach screenshots or a short video
        clip of the bug.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Make sure you've completed each step and reviewed the [code of conduct](https://github.com/Endless-Access-Community/.github/blob/main/CODE_OF_CONDUCT.md) before submitting
      options:
        - label: I've reviewed and agree to follow the code of conduct
          required: true
